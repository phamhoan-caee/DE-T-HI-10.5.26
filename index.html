<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG THI TRẮC NGHIỆM NGHỀ KHOA MÁY THI CÔNG - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --caee-blue: #003399; --header-blue: #0040cc;
            --btn-orange: #ff6600; --btn-blue: #3366ff;
            --success: #28a745; --danger: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow-x: hidden;
            transition: background-image 0.5s ease-in-out;
        }

        /* Hình nền động theo nghề */
        .bg-xe-nang { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-8.5.26/main/bg-xe-nang.jpg'); }
        .bg-can-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-8.5.26/main/bg-can-truc.jpg'); }
        .bg-cau-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-8.5.26/main/bg-cau-truc.jpg'); }

        /* Glassmorphism - Hiệu ứng kính xuyên thấu */
        .welcome-container, #quiz-content, .sidebar-right > div, #ai-container, .confirm-modal-content, .result-card {
            background: rgba(255, 255, 255, 0.2) !important; 
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #fff;
        }

        #ai-container {
            display: none; max-width: 1300px; margin: 10px auto; 
            padding: 10px 20px; align-items: center; gap: 15px; 
            border-left: 6px solid var(--btn-orange);
        }

        .progress-bar-bg { flex-grow: 1; height: 10px; background: rgba(255,255,255,0.2); border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #00ff88, #00ccff); transition: width 0.4s ease; }

        /* Digital Score Ring */
        .score-circle { 
            width: 150px; height: 150px; border-radius: 50%; 
            border: 4px solid rgba(255, 255, 255, 0.1); 
            margin: 20px auto; display: flex; flex-direction: column; 
            justify-content: center; align-items: center;
            background: rgba(0, 0, 0, 0.3); position: relative;
        }
        .score-circle::before {
            content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%; border: 3px solid transparent;
            animation: rotateRing 2s linear infinite;
        }
        @keyframes rotateRing { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        
        .score-digital-pass { color: #00ff88 !important; text-shadow: 0 0 15px #00ff88; }
        .score-digital-pass::before { border-top-color: #00ff88; }
        .score-digital-fail { color: #ff3333 !important; text-shadow: 0 0 15px #ff3333; }
        .score-digital-fail::before { border-top-color: #ff3333; }

        .timer-floating {
            position: fixed; top: 15px; right: 15px; background: #ff3333; 
            color: white; padding: 12px 25px; border-radius: 50px;
            font-weight: 900; font-size: 1.4rem; z-index: 2000; display: none;
        }

        /* Question Styles */
        .option-item { 
            background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2);
            border-radius: 10px; padding: 15px; margin-bottom: 10px; cursor: pointer; color: #fff;
        }
        .option-item.selected { background: var(--btn-blue); border-color: #fff; }
        .option-item.correct { background: var(--success) !important; }
        .option-item.wrong { background: var(--danger) !important; }

        #warning-overlay {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(220, 53, 69, 0.95); color: white; z-index: 10000; 
            flex-direction: column; justify-content: center; align-items: center;
        }
        
        #result-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        
        @media (max-width: 900px) { #quiz-screen { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="warning-overlay">
        <h1 style="font-size: 100px;">⚠️</h1>
        <h2>CẢNH BÁO VI PHẠM!</h2>
        <div id="cheat-count-msg" style="font-size: 2rem; font-weight: 800;"></div>
    </div>

    <div id="confirm-modal-overlay" style="display:none; position:fixed; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:15000; display:none; justify-content:center; align-items:center;">
        <div class="confirm-modal-content" style="max-width:400px; padding:30px; text-align:center;">
            <h3>XÁC NHẬN NỘP BÀI</h3>
            <p style="margin: 20px 0;">Bạn có chắc chắn muốn kết thúc bài thi?</p>
            <div style="display: flex; gap: 15px;">
                <button class="btn-start" style="background: #666; width:50%; border-radius:10px; padding:10px; color:#fff;" onclick="closeConfirmModal()">HỦY</button>
                <button class="btn-start" style="background: var(--caee-blue); width:50%; border-radius:10px; padding:10px; color:#fff;" onclick="finalizeSubmission()">ĐỒNG Ý</button>
            </div>
        </div>
    </div>

    <div id="timer" class="timer-floating">20:00</div>

    <div id="start-screen" style="min-height: 100vh; display: flex; justify-content: center; align-items: center;">
        <div class="welcome-container" style="max-width: 450px; padding: 30px;">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 14px; font-weight: bold;">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</div>
                <div style="font-size: 20px; color: #ffcc00; font-weight: 900; margin-top: 5px;">KHOA MÁY THI CÔNG</div>
            </div>
            <select id="jobType" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;" onchange="preloadQuestions()">
                <option value="1538604642">VẬN HÀNH XE NÂNG HÀNG</option>
                <option value="798209567">VẬN HÀNH CẦN TRỤC</option>
                <option value="1969781180">VẬN HÀNH CẦU TRỤC</option>
            </select>
            <input type="text" id="studentName" placeholder="HỌ VÀ TÊN HỌC VIÊN" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px; text-transform: uppercase;">
            <input type="text" id="studentDOB" placeholder="Ngày sinh: (VD: 12/04/2000)" style="width:100%; padding:12px; margin-bottom:10px; border-radius:8px;">
            <div style="display: flex; gap: 10px; margin-bottom: 10px;">
                <input type="text" id="khoaThi" value="Tháng 8/2026" style="flex: 1.5; padding:12px; border-radius:8px; background:#eee; color:#333;" readonly>
                <input type="password" id="maThi" placeholder="Mã thi" style="flex: 1; padding:12px; border-radius:8px;">
            </div>
            <div style="display:flex; align-items:center; margin: 15px 0; justify-content: center; gap:10px; background: rgba(255,255,255,0.1); padding: 10px; border-radius: 10px;">
                <input type="checkbox" id="modeToggle" style="width:20px; height:20px;">
                <label for="modeToggle" style="font-weight: 700; color: #ffcc00;">Chế độ ôn tập</label>
            </div>
            <button id="btnStart" style="width:100%; padding:15px; background:var(--btn-orange); border:none; border-radius:12px; color:#fff; font-weight:bold; cursor:pointer;" onclick="validateAndStart()">VÀO THI NGAY ➔</button>
        </div>
    </div>

    <div id="ai-container">
        <div style="width:50px; height:50px; border-radius:50%; overflow:hidden; border:2px solid #fff;">
            <img src="https://raw.githubusercontent.com/phamhoan-caee/de-thi-AI/main/%E1%BA%A3nh_nh%C3%A2n_vat_de_thi-removebg-preview.png" style="width:100%;">
        </div>
        <div style="flex-grow: 1;">
            <div style="font-weight: 800;">TRỢ LÝ ẢO CAEE</div>
            <div id="display-name" style="color: #ffcc00; font-size: 14px;">---</div>
        </div>
        <div class="progress-bar-bg"><div id="progress-fill"></div></div>
    </div>

    <div id="quiz-screen" style="display:none; padding:15px; grid-template-columns: 1fr 320px; gap:20px; max-width:1300px; margin:auto;">
        <div id="quiz-content" style="padding:25px;"></div>
        <div class="sidebar-right">
            <div style="padding:20px;">
                <h4 style="text-align:center; margin-bottom:15px;">SƠ ĐỒ CÂU HỎI</h4>
                <div id="nav-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;"></div>
                <button class="btn-start" style="width:100%; margin-top:20px; padding:15px; background:var(--danger); border:none; border-radius:10px; color:#fff; font-weight:bold;" onclick="openConfirmModal()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-card" style="max-width:450px; width:90%; padding:30px; text-align:center;">
            <h2 style="color:#ffcc00;">KẾT QUẢ THI</h2>
            <p id="res-info" style="margin: 15px 0;"></p>
            <div class="score-circle" id="res-circle">
                <span id="res-score" style="font-size: 2.5rem; font-weight: 900;">0</span>
                <small>/ 30 câu</small>
            </div>
            <div id="res-badge" style="padding:10px 30px; border-radius:50px; display:inline-block; font-weight:800; margin-bottom:20px;">0.0 ĐIỂM</div>
            <div style="background:rgba(255,255,255,0.1); padding:15px; border-radius:10px; font-size:0.8rem; border:1px dashed #ff3333;">
                KẾT QUẢ ĐƯỢC LƯU LẠI ĐỂ XÉT CẤP CHỨNG CHỈ.
            </div>
            <p style="margin-top:20px; font-style:italic; font-size:0.8rem;">Tự động quay lại sau <span id="countdown">15</span>s...</p>
        </div>
    </div>

<script>
const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgusT-lc4tl11z_8YIgP1Vdt0R_mm95CMCEU91Ep_gskkQMTWpJTzJ44yKFl1QS5YHDL8ZO8JyGTjr/pub?output=csv&gid=";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbx-96KkrqcZ_Q18wdljVCCe_PhZLzu8eNTdr-4J5PoDXXzxWKD6tOky3D5NPG75YZSRaw/exec";

let allQuestions = [], selectedQuestions = [], studentAnswers = [];
let currentQuestionIndex = 0, timeLeft = 1200, timerInterval, isSubmitted = false, cheatCount = 0;
const synth = window.speechSynthesis;

function preloadQuestions() {
    const jobSelect = document.getElementById('jobType');
    const gid = jobSelect.value;
    const selectedText = jobSelect.options[jobSelect.selectedIndex].text;
    document.body.className = selectedText.includes("XE NÂNG") ? 'bg-xe-nang' : (selectedText.includes("CẦN TRỤC") ? 'bg-can-truc' : 'bg-cau-truc');

    Papa.parse(BASE_CSV_URL + gid, {
        download: true, header: true, skipEmptyLines: true,
        complete: (results) => {
            allQuestions = results.data.filter(i => i.CauHoi).map(i => ({
                question: i.CauHoi, options: [i.A, i.B, i.C, i.D].filter(o => o),
                answer: i.DapAnDung ? i.DapAnDung.trim().toUpperCase() : "",
                explanation: i.Giaithich || "Hãy thực hiện đúng quy trình an toàn kỹ thuật.",
                image: i["HINH ANH"] || ""
            }));
        }
    });
}

function aiSpeak(text) {
    if (!document.getElementById('modeToggle').checked || isSubmitted) return;
    synth.cancel();
    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'vi-VN';
    synth.speak(msg);
}

function selectAns(qIdx, ans) {
    if(isSubmitted) return;
    const findIndex = studentAnswers.findIndex(a => a.qIndex === qIdx);
    if(findIndex > -1) studentAnswers[findIndex].selected = ans;
    else studentAnswers.push({qIndex: qIdx, selected: ans});

    showQuestion(qIdx, false);
    
    // Nếu ôn tập, đọc giải thích ngay
    if(document.getElementById('modeToggle').checked) {
        const q = selectedQuestions[qIdx];
        aiSpeak(`Đáp án đúng là ${q.answer}. ${q.explanation}`);
    }
}

function showQuestion(idx, shouldSpeak = true) {
    if (idx < 0 || idx >= 30) return;
    currentQuestionIndex = idx;
    const q = selectedQuestions[idx];
    const stored = studentAnswers.find(a => a.qIndex === idx);
    const labels = ['A', 'B', 'C', 'D'];
    const isReview = document.getElementById('modeToggle').checked;

    let html = `<h3>Câu ${idx + 1}: ${q.question}</h3>`;
    if(q.image) html += `<img src="${q.image}" style="max-width:100%; border-radius:10px; margin:15px 0;">`;
    
    q.options.forEach((opt, i) => {
        let cls = "";
        if (stored && opt === stored.selected) {
            cls = isReview ? (labels[i] === q.answer ? "correct" : "wrong selected") : "selected";
        } else if (isReview && stored && labels[i] === q.answer) {
            cls = "correct";
        }
        html += `<div class="option-item ${cls}" onclick="selectAns(${idx}, '${opt.replace(/'/g, "\\'")}')"><b>${labels[i]}.</b> ${opt}</div>`;
    });

    if(isReview && stored) html += `<div style="background:rgba(40,167,69,0.2); padding:15px; border-radius:10px; border-left:4px solid #28a745;"><b>🤖 AI GIẢI THÍCH:</b><br>${q.explanation}</div>`;

    html += `<div style="display:flex; gap:15px; margin-top:20px;">
                <button style="flex:1; padding:12px; border-radius:10px; border:none; background:#666; color:#fff;" onclick="showQuestion(${idx-1})" ${idx===0?'disabled':''}>Lùi lại</button>
                <button style="flex:1; padding:12px; border-radius:10px; border:none; background:var(--btn-blue); color:#fff;" onclick="showQuestion(${idx+1})" ${idx===29?'disabled':''}>Tiếp theo</button>
            </div>`;
    
    document.getElementById('quiz-content').innerHTML = html;
    renderGrid();
    document.getElementById('progress-fill').style.width = (studentAnswers.length / 30 * 100) + "%";
    if(shouldSpeak) aiSpeak(`Câu ${idx + 1}: ${q.question}`);
}

async function validateAndStart() {
    const maThi = document.getElementById('maThi').value.trim();
    const name = document.getElementById('studentName').value.trim();
    if(!name || !maThi) return alert("Vui lòng nhập đầy đủ thông tin!");
    
    document.getElementById('btnStart').innerText = "ĐANG XÁC THỰC...";
    try {
        const res = await fetch(`${WEB_APP_URL}?action=checkCode&code=${encodeURIComponent(maThi)}&name=${encodeURIComponent(name)}`);
        const result = await res.json();
        if(result.isValid) {
            document.getElementById('display-name').innerText = name.toUpperCase();
            selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('ai-container').style.display = 'flex';
            document.getElementById('timer').style.display = 'block';
            document.getElementById('quiz-screen').style.display = 'grid';
            showQuestion(0);
            timerInterval = setInterval(() => {
                timeLeft--;
                let m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
                if(timeLeft <= 0) finalizeSubmission();
            }, 1000);
        } else alert("Mã thi không đúng!");
    } catch(e) { alert("Lỗi kết nối!"); }
}

function renderGrid() {
    const grid = document.getElementById('nav-grid'); grid.innerHTML = "";
    selectedQuestions.forEach((_, i) => {
        const has = studentAnswers.some(a => a.qIndex === i);
        const style = i === currentQuestionIndex ? 'border:2px solid #ffcc00;' : '';
        grid.innerHTML += `<div onclick="showQuestion(${i})" style="height:40px; display:flex; justify-content:center; align-items:center; border-radius:8px; cursor:pointer; background:${has?'#003399':'rgba(255,255,255,0.1)'}; ${style}">${i+1}</div>`;
    });
}

function openConfirmModal() { document.getElementById('confirm-modal-overlay').style.display = 'flex'; }
function closeConfirmModal() { document.getElementById('confirm-modal-overlay').style.display = 'none'; }

async function finalizeSubmission() {
    if(isSubmitted) return;
    isSubmitted = true;
    closeConfirmModal();
    clearInterval(timerInterval);
    synth.cancel();

    let correct = 0;
    selectedQuestions.forEach((q, i) => {
        const ans = studentAnswers.find(a => a.qIndex === i);
        if(ans) {
            const labels = ['A','B','C','D'];
            if(labels[q.options.indexOf(ans.selected)] === q.answer) correct++;
        }
    });

    const score10 = parseFloat(((correct / 30) * 10).toFixed(1));
    const isPass = score10 >= 8.3;
    const isReview = document.getElementById('modeToggle').checked;

    document.getElementById('res-info').innerHTML = `Học viên: <b>${document.getElementById('studentName').value}</b><br>Khóa: <b>${document.getElementById('khoaThi').value}</b>`;
    document.getElementById('res-score').innerText = correct;
    const badge = document.getElementById('res-badge');
    badge.innerText = score10 + " ĐIỂM - " + (isPass ? "ĐẠT" : "KHÔNG ĐẠT");
    badge.style.background = isPass ? "var(--success)" : "var(--danger)";
    document.getElementById('res-circle').className = 'score-circle ' + (isPass ? 'score-digital-pass' : 'score-digital-fail');
    document.getElementById('result-screen').style.display = 'flex';

    // Gửi dữ liệu
    let ngheName = document.getElementById('jobType').options[document.getElementById('jobType').selectedIndex].text;
    if(isReview) ngheName += " (ÔN TẬP)";

    const formData = new URLSearchParams();
    formData.append('maThi', document.getElementById('maThi').value);
    formData.append('name', document.getElementById('studentName').value);
    formData.append('birthDate', document.getElementById('studentDOB').value);
    formData.append('score', `${correct}/30`);
    formData.append('status', isPass ? "ĐẠT" : "KHÔNG ĐẠT");
    formData.append('viPham', cheatCount);
    formData.append('ngheName', ngheName);

    try { fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: formData }); } catch(e) {}

    let c = 15;
    setInterval(() => { if(c > 0) document.getElementById('countdown').innerText = --c; else location.reload(); }, 1000);
}

document.addEventListener("visibilitychange", () => {
    if (document.visibilityState === 'hidden' && !isSubmitted && document.getElementById('quiz-screen').style.display === 'grid') {
        cheatCount++;
        document.getElementById('warning-overlay').style.display = 'flex';
        document.getElementById('cheat-count-msg').innerText = `Lần vi phạm: ${cheatCount}/3`;
        aiSpeak(cheatCount < 3 ? `Cảnh báo lần ${cheatCount}` : "Vi phạm quá 3 lần, tự động nộp bài");
        if (cheatCount >= 3) finalizeSubmission();
    }
});
window.onfocus = () => { if(cheatCount < 3) document.getElementById('warning-overlay').style.display = 'none'; };
window.onload = preloadQuestions;
</script>
</body>
</html>
