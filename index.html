<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HỆ THỐNG THI TRẮC NGHIỆM NGHỀ KHOA MÁY THI CÔNG - CAEE</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>
    <style>
        :root {
            --caee-blue: #003399; --header-blue: #0040cc;
            --btn-orange: #ff6600; --btn-blue: #3366ff;
            --success: #28a745; --danger: #dc3545;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; }
        
        body { 
            background-color: #000;
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
            font-family: 'Segoe UI', Arial, sans-serif; 
            overflow-x: hidden;
            transition: background-image 0.5s ease-in-out;
        }

        .bg-xe-nang { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-8.5.26/main/bg-xe-nang.jpg'); }
        .bg-can-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-8.5.26/main/bg-can-truc.jpg'); }
        .bg-cau-truc { background-image: url('https://raw.githubusercontent.com/phamhoan-caee/trac-nghiem-8.5.26/main/bg-cau-truc.jpg'); }

        .welcome-container, #quiz-content, .sidebar-right > div, #ai-container, .confirm-modal-content {
            background: rgba(221, 221, 221, 0.55) !important;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 15px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.4); 
            border: 1px solid rgba(255, 255, 255, 0.4);
        }

        #ai-container {
            display: none; max-width: 1300px; margin: 5px auto; 
            padding: 10px 20px; align-items: center; gap: 15px; 
            border-left: 6px solid var(--btn-orange);
        }

        .progress-container { width: 100%; margin-top: 10px; display: flex; align-items: center; gap: 10px; }
        .progress-bar-bg { flex-grow: 1; height: 10px; background: rgba(255,255,255,0.3); border-radius: 10px; overflow: hidden; }
        #progress-fill { height: 100%; width: 0%; background: linear-gradient(90deg, #28a745, #85ffbd); transition: width 0.4s ease; }
        #progress-text { font-weight: 900; color: var(--caee-blue); min-width: 55px; text-align: right; }

        .ai-avatar {
            position: relative; width: 55px; height: 55px; 
            border-radius: 50%; border: 2px solid white; overflow: hidden; flex-shrink: 0;
            background: white;
        }
        .ai-avatar img { width: 100%; height: 100%; object-fit: cover; }
        
        .speaking-waves {
            display: none; position: absolute; bottom: 5px; left: 50%; transform: translateX(-50%);
            gap: 3px; align-items: flex-end; height: 12px;
        }
        .wave { width: 3px; background: var(--btn-orange); border-radius: 3px; animation: wave-anim 0.5s infinite ease-in-out; }
        @keyframes wave-anim { 0%, 100% { height: 4px; } 50% { height: 12px; } }

        .timer-floating {
            position: fixed; top: 10px; right: 10px;
            background: #ff3333; color: white; padding: 10px 20px; border-radius: 50px;
            font-weight: 900; font-size: 1.3rem; border: 2px solid white;
            z-index: 2000; display: none; box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        #start-screen { min-height: 90vh; display: flex; justify-content: center; align-items: center; }
        .welcome-container { width: 95%; max-width: 450px; padding: 30px; }
        
        .form-control { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; font-size: 1rem; font-weight: 600; }
        .btn-start { background: var(--caee-blue); color: white; border: none; width: 100%; padding: 15px; border-radius: 12px; font-weight: bold; cursor: pointer; font-size: 1.1rem; transition: 0.2s; }
        
        #quiz-screen { padding: 15px; display: none; grid-template-columns: 1fr 320px; gap: 20px; max-width: 1300px; margin: auto; }
        #quiz-content { padding: 25px; min-height: 450px; position: relative; }
        
        .option-item { border: 2px solid rgba(255,255,255,0.3); border-radius: 10px; padding: 18px; margin-bottom: 12px; cursor: pointer; transition: all 0.2s; font-weight: 600; color: #1a1a1a; background: rgba(255,255,255,0.4); }
        .option-item:hover { background: rgba(255,255,255,0.6); }
        .option-item.selected { border-color: var(--btn-blue); background: #eef2ff; color: var(--caee-blue); }
        .option-item.correct { background: #d4edda !important; border-color: #28a745 !important; color: #155724 !important; }
        .option-item.wrong { background: #f8d7da !important; border-color: #dc3545 !important; color: #721c24 !important; }

        #explanation-box {
            display: none; margin-top: 20px; padding: 15px; background: rgba(255, 255, 255, 0.9);
            border-left: 5px solid var(--success); border-radius: 8px; color: #333; font-weight: 500;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1); animation: fadeIn 0.4s ease;
        }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        #result-screen { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.8); z-index: 9999; justify-content: center; align-items: center; }
        .result-card { background: rgba(221, 221, 221, 0.6) !important; backdrop-filter: blur(20px); width: 90%; max-width: 450px; border-radius: 25px; padding: 30px; text-align: center; border: 1px solid rgba(255,255,255,0.4); }
        
        .score-circle { width: 140px; height: 140px; border-radius: 50%; margin: 20px auto; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0,0,0,0.3); border: 4px solid rgba(255,255,255,0.1); position: relative; }
        #res-score { font-size: 2.5rem; font-weight: 900; color: white; }
        .status-badge { display: inline-block; padding: 10px 40px; border-radius: 50px; color: white; font-weight: 800; margin-top: 15px; }

        @media (max-width: 900px) { #quiz-screen { grid-template-columns: 1fr; } }
    </style>
</head>
<body oncontextmenu="return false">

    <div id="warning-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(220,53,69,0.95); color:white; z-index:10000; flex-direction:column; justify-content:center; align-items:center; text-align:center;">
        <h1 style="font-size: 80px;">⚠️</h1>
        <h2>CẢNH BÁO VI PHẠM!</h2>
        <div id="cheat-count-msg" style="margin-top:15px; font-size:1.5rem; font-weight:800;"></div>
    </div>

    <div id="timer" class="timer-floating">20:00</div>

    <div id="start-screen">
        <div class="welcome-container">
            <div style="text-align: center; margin-bottom: 20px;">
                <div style="font-size: 16px; color: var(--caee-blue); font-weight: bold;">TRƯỜNG CĐ CƠ ĐIỆN NÔNG NGHIỆP VÀ MÔI TRƯỜNG</div>
                <div style="font-size: 18px; color: #d32f2f; font-weight: 900; margin-top: 5px; text-transform: uppercase;">KHOA MÁY THI CÔNG</div>
            </div>
            <select id="jobType" class="form-control" style="background: #fff8e1; border: 2px solid orange;" onchange="preloadQuestions()">
                <option value="1538604642">VẬN HÀNH XE NÂNG HÀNG</option>
                <option value="798209567">VẬN HÀNH CẦN TRỤC</option>
                <option value="1969781180">VẬN HÀNH CẦU TRỤC</option>
            </select>
            <input type="text" id="studentName" placeholder="HỌ VÀ TÊN HỌC VIÊN" class="form-control" style="text-transform: uppercase;">
            <input type="text" id="studentDOB" placeholder="Ngày sinh: (VD: 12/4/2000)" class="form-control">
            <div style="display: flex; gap: 10px;">
                <input type="text" id="khoaThi" value="Tháng 8/2026" class="form-control" style="flex: 1.5; background: #eee;" readonly>
                <input type="password" id="maThi" placeholder="Mã thi" class="form-control" style="flex: 1;">
            </div>
            <div style="display:flex; align-items:center; margin: 15px 0; justify-content: center; gap:10px; background: rgba(227, 242, 253, 0.8); padding: 10px; border-radius: 10px;">
                <input type="checkbox" id="modeToggle" style="width:20px; height:20px; cursor: pointer;" checked>
                <label for="modeToggle" style="cursor:pointer; font-weight: 700; color: #0d47a1;">Chế độ ÔN TẬP (Có AI hướng dẫn)</label>
            </div>
            <button class="btn-start" id="btnStart" onclick="validateAndStart()">VÀO THI NGAY ➔</button>
        </div>
    </div>

    <div id="ai-container">
        <div class="ai-avatar">
            <img src="https://raw.githubusercontent.com/phamhoan-caee/de-thi-AI/main/%E1%BA%A3nh_nh%C3%A2n_vat_de_thi-removebg-preview.png" alt="AI">
            <div class="speaking-waves" id="ai-waves">
                <div class="wave"></div><div class="wave"></div><div class="wave"></div>
            </div>
        </div>
        <div style="flex-grow: 1;">
            <div style="color: var(--caee-blue); font-weight: 800; font-size: 16px;">TRỢ LÝ ẢO CAEE</div>
            <div style="color: #333; font-size: 14px; font-weight: 600;">Học viên: <span id="display-name" style="color: #d32f2f;">---</span></div>
        </div>
        <div class="progress-container">
            <div class="progress-bar-bg"><div id="progress-fill"></div></div>
            <div id="progress-text">0/30</div>
        </div>
    </div>

    <div id="quiz-screen">
        <div id="quiz-content"></div>
        <div class="sidebar-right">
            <div>
                <h4 style="margin-bottom:15px; text-align:center; color: var(--caee-blue);">SƠ ĐỒ CÂU HỎI</h4>
                <div id="nav-grid" style="display:grid; grid-template-columns: repeat(5, 1fr); gap:8px;"></div>
                <button id="submitBtn" class="btn-start" style="margin-top:20px;" onclick="openConfirmModal()">NỘP BÀI THI</button>
            </div>
        </div>
    </div>

    <div id="result-screen">
        <div class="result-card">
            <h2>KẾT QUẢ THI</h2>
            <div id="res-info" style="margin: 15px 0; font-weight: 600; color: var(--caee-blue);"></div>
            <div class="score-circle">
                <span id="res-score">0</span>
                <small style="color:white; font-weight:bold;">/ 30 CÂU</small>
            </div>
            <div id="res-badge" class="status-badge"></div>
            <p style="margin-top:20px; font-style:italic; font-size:0.8rem;">Hệ thống tự đóng sau <span id="countdown">15</span> giây...</p>
        </div>
    </div>

<script>
const BASE_CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTgusT-lc4tl11z_8YIgP1Vdt0R_mm95CMCEU91Ep_gskkQMTWpJTzJ44yKFl1QS5YHDL8ZO8JyGTjr/pub?output=csv&gid=";
const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxo9V0Hxf0auVVihvfhtWFxTAK3f6fcG_dOf4-CE4KIOhRP71L5AKlvXBQuJsqz_Ic5BQ/exec";

let allQuestions = [], selectedQuestions = [], studentAnswers = [];
let currentQuestionIndex = 0, timeLeft = 1200, timerInterval, isSubmitted = false, cheatCount = 0;
const synth = window.speechSynthesis;

// 1. AI ĐỌC CÂU HỎI VÀ ĐÁP ÁN
function aiSpeakQuestion(qObj) {
    if (!document.getElementById('modeToggle').checked || isSubmitted) return;
    
    synth.cancel();
    const labels = ['A', 'B', 'C', 'D'];
    let text = `Câu hỏi số ${currentQuestionIndex + 1}: ${qObj.question}. `;
    qObj.options.forEach((opt, i) => { text += `Đáp án ${labels[i]}: ${opt}. `; });

    const msg = new SpeechSynthesisUtterance(text);
    msg.lang = 'vi-VN';
    msg.rate = 1.0;
    msg.onstart = () => { document.getElementById('ai-waves').style.display = 'flex'; };
    msg.onend = () => { document.getElementById('ai-waves').style.display = 'none'; };
    synth.speak(msg);
}

// 2. AI ĐỌC GIẢI THÍCH
function aiSpeakExplanation(qObj) {
    if (!document.getElementById('modeToggle').checked || isSubmitted) return;

    synth.cancel();
    const msg = new SpeechSynthesisUtterance(`Bạn đã chọn đáp án. Đáp án đúng là ${qObj.answer}. Giải thích: ${qObj.explanation}`);
    msg.lang = 'vi-VN';
    msg.rate = 1.0;
    msg.onstart = () => { document.getElementById('ai-waves').style.display = 'flex'; };
    msg.onend = () => { document.getElementById('ai-waves').style.display = 'none'; };
    synth.speak(msg);
}

function selectAns(qIdx, ans) {
    if(isSubmitted) return;
    
    const findIndex = studentAnswers.findIndex(a => a.qIndex === qIdx);
    if(findIndex > -1) studentAnswers[findIndex].selected = ans;
    else studentAnswers.push({qIndex: qIdx, selected: ans});

    const q = selectedQuestions[qIdx];
    showQuestion(qIdx, false); // Cập nhật giao diện mà không đọc lại câu hỏi
    
    // Hiện giải thích và đọc
    if(document.getElementById('modeToggle').checked) {
        document.getElementById('explanation-box').style.display = 'block';
        aiSpeakExplanation(q);
    }
}

function showQuestion(idx, shouldSpeak = true) {
    if (idx < 0 || idx >= 30) return;
    currentQuestionIndex = idx;
    const q = selectedQuestions[idx];
    const stored = studentAnswers.find(a => a.qIndex === idx);
    const labels = ['A', 'B', 'C', 'D'];
    const isReview = document.getElementById('modeToggle').checked;

    let html = `<h3 style="color:var(--caee-blue); margin-bottom:15px; font-size:1.3rem;">Câu ${idx + 1}: ${q.question}</h3>`;
    if(q.image) html += `<div style="text-align:center"><img src="${q.image}" style="max-width:100%; max-height:250px; border-radius:12px; margin-bottom:15px;"></div>`;
    
    q.options.forEach((opt, i) => {
        let cls = "";
        if (stored && opt === stored.selected) {
            cls = isReview ? ((labels[i] === q.answer) ? "correct" : "wrong selected") : "selected";
        } else if (isReview && stored && labels[i] === q.answer) {
            cls = "correct";
        }
        html += `<div class="option-item ${cls}" onclick="selectAns(${idx}, '${opt.replace(/'/g, "\\'")}')"><b>${labels[i]}.</b> ${opt}</div>`;
    });

    html += `<div id="explanation-box" style="${(isReview && stored) ? 'display:block' : 'display:none'}">
                <b>🤖 TRỢ LÝ AI GIẢI THÍCH:</b> <br> ${q.explanation}
             </div>`;

    html += `<div style="display:flex; justify-content:space-between; margin-top:20px; gap:15px;">
                <button class="btn-start" style="background:var(--btn-blue); flex:1;" onclick="showQuestion(${idx-1})" ${idx===0?'disabled':''}>Quay lại</button>
                <button class="btn-start" style="background:var(--btn-blue); flex:1;" onclick="showQuestion(${idx+1})" ${idx===29?'disabled':''}>Câu tiếp theo</button>
             </div>`;
    
    document.getElementById('quiz-content').innerHTML = html;
    renderGrid();
    updateProgressBar();
    if (shouldSpeak) aiSpeakQuestion(q);
}

function preloadQuestions() {
    const gid = document.getElementById('jobType').value;
    const selectedText = document.getElementById('jobType').options[document.getElementById('jobType').selectedIndex].text;
    document.body.className = '';
    if (selectedText.includes("XE NÂNG")) document.body.classList.add('bg-xe-nang');
    else if (selectedText.includes("CẦN TRỤC")) document.body.classList.add('bg-can-truc');
    else if (selectedText.includes("CẦU TRỤC")) document.body.classList.add('bg-cau-truc');

    Papa.parse(BASE_CSV_URL + gid, {
        download: true, header: true, skipEmptyLines: true,
        complete: function(results) {
            allQuestions = results.data.filter(i => i.CauHoi).map(i => ({
                question: i.CauHoi, options: [i.A, i.B, i.C, i.D].filter(o => o),
                answer: i.DapAnDung ? i.DapAnDung.trim().toUpperCase() : "",
                explanation: i.Giaithich || "Vui lòng tuân thủ đúng quy trình vận hành an toàn máy thi công.",
                image: i["HINH ANH"] || "" 
            }));
        }
    });
}

async function validateAndStart() {
    const name = document.getElementById('studentName').value.trim();
    const maThi = document.getElementById('maThi').value.trim();
    if(!name || !maThi) return alert("Vui lòng nhập đầy đủ thông tin!");
    
    const btn = document.getElementById('btnStart');
    btn.disabled = true; btn.innerText = "ĐANG KHỞI TẠO...";
    
    try {
        const res = await fetch(`${WEB_APP_URL}?action=checkCode&code=${encodeURIComponent(maThi)}`);
        const result = await res.json();
        if(result.isValid) startQuiz(); 
        else { alert("Mã thi không đúng!"); btn.disabled = false; btn.innerText = "VÀO THI NGAY ➔"; }
    } catch(e) { alert("Lỗi kết nối!"); btn.disabled = false; }
}

function startQuiz() {
    document.getElementById('display-name').innerText = document.getElementById('studentName').value.toUpperCase();
    selectedQuestions = allQuestions.sort(() => 0.5 - Math.random()).slice(0, 30);
    document.getElementById('start-screen').style.display = 'none';
    document.getElementById('ai-container').style.display = 'flex';
    document.getElementById('timer').style.display = 'block';
    document.getElementById('quiz-screen').style.display = 'grid';
    showQuestion(0);
    startTimer();
}

function startTimer() {
    timerInterval = setInterval(() => {
        timeLeft--;
        let m = Math.floor(timeLeft/60), s = timeLeft%60;
        document.getElementById('timer').innerText = `${m}:${s<10?'0':''}${s}`;
        if(timeLeft <= 0) finalizeSubmission();
    }, 1000);
}

function updateProgressBar() {
    const done = studentAnswers.length;
    document.getElementById('progress-fill').style.width = (done / 30 * 100) + "%";
    document.getElementById('progress-text').innerText = done + "/30";
}

function renderGrid() {
    const grid = document.getElementById('nav-grid'); grid.innerHTML = "";
    selectedQuestions.forEach((_, i) => {
        const hasAns = studentAnswers.some(a => a.qIndex === i);
        const active = i === currentQuestionIndex ? 'border:3px solid var(--btn-orange);' : '';
        const bg = hasAns ? 'background:var(--caee-blue); color:white;' : 'background:rgba(255,255,255,0.3);';
        grid.innerHTML += `<div onclick="showQuestion(${i})" style="height:40px; display:flex; justify-content:center; align-items:center; border-radius:8px; cursor:pointer; font-weight:bold; ${bg} ${active}">${i+1}</div>`;
    });
}

function openConfirmModal() { if(confirm("Bạn có chắc chắn muốn nộp bài?")) finalizeSubmission(); }

async function finalizeSubmission() {
    if (isSubmitted) return;
    isSubmitted = true;
    clearInterval(timerInterval); 
    synth.cancel();
    
    let correct = 0;
    selectedQuestions.forEach((q, i) => {
        const ans = studentAnswers.find(a => a.qIndex === i);
        if(ans) {
            const labels = ['A','B','C','D'];
            if(labels[q.options.indexOf(ans.selected)] === q.answer) correct++;
        }
    });

    const score10 = parseFloat(((correct / 30) * 10).toFixed(1));
    const status = score10 >= 8.3 ? "ĐẠT" : "KHÔNG ĐẠT";

    document.getElementById('res-info').innerHTML = `Học viên: ${document.getElementById('studentName').value.toUpperCase()}<br>Khóa: ${document.getElementById('khoaThi').value}`;
    document.getElementById('res-score').innerText = correct;
    const badge = document.getElementById('res-badge');
    badge.innerText = status + " (" + score10 + " ĐIỂM)";
    badge.style.background = status === "ĐẠT" ? "#28a745" : "#dc3545";
    
    document.getElementById('result-screen').style.display = 'flex';

    // Gửi dữ liệu
    const formData = new URLSearchParams();
    formData.append('maThi', document.getElementById('maThi').value);
    formData.append('name', document.getElementById('studentName').value);
    formData.append('birthDate', document.getElementById('studentDOB').value);
    formData.append('score', `${correct}/30`);
    formData.append('status', status);
    formData.append('ngheName', document.getElementById('jobType').options[document.getElementById('jobType').selectedIndex].text);

    try { await fetch(WEB_APP_URL, { method: "POST", mode: "no-cors", body: formData }); } catch(e) {}

    let count = 15;
    setInterval(() => {
        if(count > 0) { count--; document.getElementById('countdown').innerText = count; }
        else location.reload();
    }, 1000);
}

window.onload = preloadQuestions;
</script>
</body>
</html>
